<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Test - Vikings Vocab</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .question { background: #f5f5f5; padding: 20px; margin: 20px 0; border-radius: 10px; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 24px; border-radius: 20px; font-size: 1em; cursor: pointer; margin-top: 15px; }
        .btn:disabled { background: #ccc; }
        .result { margin-top: 20px; padding: 20px; background: #e8f4f8; border-radius: 10px; display: none; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>🧪 AI API Test Page</h1>
    <p>Testing Aliyun Qwen API connection for vocabulary explanations.</p>
    
    <div class="question">
        <h2>Question 1: What does "excavate" mean?</h2>
        <label><input type="radio" name="q1" value="a"> A) To build</label><br>
        <label><input type="radio" name="q1" value="b"> B) To dig carefully</label><br>
        <label><input type="radio" name="q1" value="c"> C) To paint</label><br>
        <label><input type="radio" name="q1" value="d"> D) To sail</label><br>
        
        <button class="btn" onclick="getAIExplanation()">
            <span id="btn-text">🤖 Get AI Explanation</span>
        </button>
        
        <div id="result" class="result"></div>
    </div>
    
    <div style="margin-top: 30px; padding: 20px; background: #fff3cd; border-radius: 10px;">
        <h3>📋 Test Instructions:</h3>
        <ol>
            <li>Click "🤖 Get AI Explanation"</li>
            <li>Wait 2-3 seconds</li>
            <li>If you see AI explanation → API works! ✅</li>
            <li>If you see error → Check API key ❌</li>
        </ol>
    </div>

    <script>
        async function getAIExplanation() {
            const btn = document.querySelector('.btn');
            const result = document.getElementById('result');
            const btnText = document.getElementById('btn-text');
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Asking Aliyun AI...';
            
            try {
                const response = await fetch('https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer sk-92b75e89aa404648b08741885f191e6b',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'qwen-plus',
                        input: {
                            messages: [{
                                role: 'system',
                                content: 'You are an ESL English teacher. Explain vocabulary with etymology, usage, related words, and examples. Provide bilingual (English + Traditional Chinese) explanations. Use HTML formatting.'
                            }, {
                                role: 'user',
                                content: 'Explain the word "excavate" in detail. Include: 1) Word Origin, 2) Technical Usage, 3) Related Words, 4) Example sentence. Provide both English and Traditional Chinese explanations.'
                            }]
                        },
                        parameters: {
                            temperature: 0.7,
                            max_tokens: 500
                        }
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                const aiResponse = data.output.text;
                
                result.innerHTML = `
                    <h4>✅ AI Response Received!</h4>
                    <div style="line-height: 1.8; margin-top: 15px;">${aiResponse}</div>
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd; font-size: 0.85em; color: #666;">
                        <strong>🤖 Generated by Aliyun Qwen API</strong>
                    </div>
                `;
                result.style.display = 'block';
                result.style.background = '#d4edda';
                btnText.innerHTML = '✅ Success!';
                
            } catch (error) {
                console.error('AI API Error:', error);
                result.innerHTML = `
                    <h4>❌ API Error</h4>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p><strong>Possible causes:</strong></p>
                    <ul>
                        <li>API key expired or invalid</li>
                        <li>Network connection issue</li>
                        <li>CORS blocking (browser security)</li>
                        <li>Aliyun service unavailable</li>
                    </ul>
                    <p style="margin-top: 15px;"><strong>💡 Solution:</strong> Check Zeabur deployment or contact Aliyun support.</p>
                `;
                result.style.display = 'block';
                result.style.background = '#f8d7da';
                btnText.innerHTML = '🔄 Retry';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
