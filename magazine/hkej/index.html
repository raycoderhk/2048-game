<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📰 信報 - 期號列表 | HKEJ Archive</title>
    <style>
        :root {
            --hkej-blue: #1e3a8a;
            --bg-color: #f5f5f5;
            --card-bg: #fff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            padding: 40px 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            padding: 12px 24px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .back-link:hover { background: #555; transform: translateY(-2px); }
        
        .header { text-align: center; margin-bottom: 50px; }
        .magazine-title { font-size: 3em; color: var(--hkej-blue); margin-bottom: 10px; font-weight: bold; }
        .magazine-subtitle { font-size: 1.3em; color: #666; }
        
        .issues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
        }
        
        .issue-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            display: block;
        }
        .issue-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        
        .issue-cover {
            width: 100%;
            height: 380px;
            background: linear-gradient(135deg, var(--hkej-blue) 0%, #3b5998 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .issue-cover.has-image { background: none; }
        
        .issue-cover::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: 1;
        }
        
        .issue-cover.has-image::before { display: none; }
        
        .issue-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
        }
        
        .cover-content {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            margin-top: auto;
            margin-bottom: 20px;
        }
        
        .cover-date { font-size: 1.5em; font-weight: bold; }
        .cover-label { font-size: 0.9em; opacity: 0.9; margin-top: 5px; }
        
        .issue-info { padding: 20px; }
        .issue-headline { font-size: 1.2em; font-weight: bold; color: #333; margin-bottom: 10px; line-height: 1.4; }
        .issue-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #888;
            margin-top: 15px;
        }
        .meta-item { display: flex; align-items: center; gap: 5px; }
        
        .tag {
            display: inline-block;
            padding: 5px 12px;
            background: var(--hkej-blue);
            color: white;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .tag.new { background: linear-gradient(135deg, #f093fb, #f5576c); }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            color: #666;
            font-size: 0.9em;
        }
        .footer a { color: var(--hkej-blue); text-decoration: none; }
        
        @media (max-width: 768px) {
            .magazine-title { font-size: 2em; }
            .issues-grid { grid-template-columns: 1fr; }
            .issue-cover { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← 返回雜誌存檔 | Back to Magazine Archive</a>
        
        <div class="header">
            <h1 class="magazine-title">📰 信報</h1>
            <p class="magazine-subtitle">HKEJ Archive - 香港經濟日報雜誌存檔</p>
        </div>
        
        <div class="issues-grid">
            <!-- March 12, 2026 Issue -->
            <a href="2026-03-12/" class="issue-card">
                <div class="issue-cover has-image">
                    <img src="2026-03-12/cover.jpg" alt="HKEJ March 12, 2026 Cover">
                    <div class="cover-content">
                        <div class="cover-date">March 12, 2026</div>
                        <div class="cover-label">今日信報</div>
                    </div>
                </div>
                <div class="issue-info">
                    <span class="tag new">✨ 最新</span>
                    <h2 class="issue-headline">國泰捱貴油 預告加燃油附加費</h2>
                    <div class="issue-meta">
                        <span class="meta-item">📝 要聞 + 評論</span>
                        <span class="meta-item">📊 頭條新聞</span>
                        <span class="meta-item">🆕 2026-03-12</span>
                    </div>
                </div>
            </a>
        </div>
        
        <div class="footer">
            <p><strong>OpenClaw Magazine Archive - HKEJ 信報</strong></p>
            <p style="margin-top: 10px;">
                <a href="../../">🎮 GameWorld</a> | 
                <a href="../">📚 Magazine Archive</a> | 
                <a href="https://www.hkej.com/" target="_blank">HKEJ Official</a>
            </p>
        </div>
    </div>
</body>
</html>
