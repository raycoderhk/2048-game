<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="1000" fill="#1e3a8a"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b5998;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#grad)"/>
  
  <!-- Decorative pattern -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="100" cy="100" r="50"/>
    <circle cx="700" cy="150" r="80"/>
    <circle cx="400" cy="500" r="100"/>
    <circle cx="150" cy="800" r="60"/>
    <circle cx="650" cy="850" r="90"/>
  </g>
  
  <!-- Newspaper icon -->
  <text x="400" y="250" font-size="120" text-anchor="middle" fill="#ffffff" opacity="0.3">📰</text>
  
  <!-- HKEJ Logo Text -->
  <text x="400" y="400" font-size="72" font-weight="bold" text-anchor="middle" fill="#ffffff">信報</text>
  <text x="400" y="450" font-size="28" text-anchor="middle" fill="#ffffff" opacity="0.8">HKEJ</text>
  
  <!-- Date Box -->
  <rect x="150" y="550" width="500" height="150" rx="20" fill="#ffffff" opacity="0.15"/>
  <rect x="150" y="550" width="500" height="150" rx="20" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  
  <!-- Date Text -->
  <text x="400" y="610" font-size="32" text-anchor="middle" fill="#ffffff" opacity="0.9">March 12, 2026</text>
  <text x="400" y="660" font-size="24" text-anchor="middle" fill="#ffffff" opacity="0.7">2026 年 3 月 12 日</text>
  <text x="400" y="690" font-size="20" text-anchor="middle" fill="#ffffff" opacity="0.6">星期四 Thursday</text>
  
  <!-- Section Badge -->
  <rect x="275" y="750" width="250" height="50" rx="25" fill="#ffffff" opacity="0.2"/>
  <text x="400" y="785" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff">今日要聞</text>
  
  <!-- Footer -->
  <text x="400" y="920" font-size="16" text-anchor="middle" fill="#ffffff" opacity="0.5">OpenClaw Magazine Archive</text>
  <text x="400" y="950" font-size="14" text-anchor="middle" fill="#ffffff" opacity="0.4">gameworld.zeabur.app</text>
</svg>
