<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 My Book Tracker</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .book-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .book-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--bg-input);
            border-bottom: 1px solid var(--border);
        }

        .book-info {
            padding: 20px;
        }

        .book-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text);
        }

        .book-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .book-author {
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 10px;
        }

        .book-topics {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .topic-tag {
            background: var(--bg-input);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .book-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-want-to-read {
            background: var(--bg-input);
            color: var(--text-muted);
        }

        .status-reading {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-dnf {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .book-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            border: 1px solid var(--border);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .close-btn:hover {
            color: var(--text);
        }

        .modal-body {
            padding: 20px;
        }

        .book-detail-header {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .book-detail-cover {
            width: 200px;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            background: var(--bg-input);
        }

        .book-detail-info {
            flex: 1;
            min-width: 300px;
        }

        .notes-section {
            margin-top: 30px;
        }

        .notes-section h3 {
            margin-bottom: 15px;
            color: var(--primary);
        }

        .note-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .note-input {
            flex: 1;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
        }

        .note-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .note-item {
            background: var(--bg-input);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .note-date {
            color: var(--primary);
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .note-content {
            color: var(--text);
            line-height: 1.6;
        }

        .status-select {
            padding: 8px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .rating-stars {
            display: flex;
            gap: 5px;
            margin: 15px 0;
        }

        .star {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--bg-input);
            transition: color 0.2s;
        }

        .star.active, .star:hover {
            color: var(--warning);
        }

        .add-book-form {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 1.8rem;
            }
            
            .books-grid {
                grid-template-columns: 1fr;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .last-updated {
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 My Book Tracker</h1>
            <p>Track your reading journey with persistent notes and dated entries</p>
        </header>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalBooks">0</div>
                <div class="stat-label">Total Books</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="readingCount">0</div>
                <div class="stat-label">Reading</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="wantToReadCount">0</div>
                <div class="stat-label">Want to Read</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="reading">📖 Reading</button>
            <button class="filter-btn" data-filter="want-to-read">📋 Want to Read</button>
            <button class="filter-btn" data-filter="completed">✅ Completed</button>
            <button class="filter-btn" onclick="showAddBookForm()">➕ Add Book</button>
        </div>

        <!-- Add Book Form (Hidden by default) -->
        <div id="addBookForm" class="add-book-form" style="display: none;">
            <h2 style="margin-bottom: 20px;">Add New Book</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="newBookTitle" placeholder="Book title">
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="newBookAuthor" placeholder="Author name">
                </div>
            </div>
            <div class="form-group">
                <label>Subtitle</label>
                <input type="text" id="newBookSubtitle" placeholder="Subtitle (optional)">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="newBookDescription" rows="3" placeholder="Brief description"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Type</label>
                    <select id="newBookType">
                        <option value="book">Book</option>
                        <option value="magazine">Magazine</option>
                        <option value="article">Article</option>
                        <option value="ebook">E-book</option>
                        <option value="audiobook">Audiobook</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="newBookStatus">
                        <option value="want-to-read">Want to Read</option>
                        <option value="reading">Reading</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Topics (comma-separated)</label>
                <input type="text" id="newBookTopics" placeholder="e.g., Fiction, Science, History">
            </div>
            <div class="form-group">
                <label>Cover Image URL (optional)</label>
                <input type="text" id="newBookCover" placeholder="https://... or leave empty">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="addNewBook()">Add Book</button>
                <button class="btn btn-secondary" onclick="hideAddBookForm()">Cancel</button>
            </div>
        </div>

        <!-- Books Grid -->
        <div id="booksGrid" class="books-grid"></div>

        <!-- Last Updated -->
        <div class="last-updated">
            <p>Last updated: <span id="lastUpdated">-</span></p>
        </div>
    </div>

    <!-- Book Detail Modal -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Book Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="book-detail-header">
                    <img id="modalCover" class="book-detail-cover" src="" alt="Book Cover">
                    <div class="book-detail-info">
                        <h3 id="modalBookTitle" style="font-size: 1.5rem; margin-bottom: 5px;"></h3>
                        <p id="modalBookSubtitle" style="color: var(--text-muted); margin-bottom: 10px;"></p>
                        <p id="modalBookAuthor" style="color: var(--primary); font-weight: 600; margin-bottom: 15px;"></p>
                        
                        <label style="color: var(--text-muted); font-size: 0.9rem;">Status:</label>
                        <select id="modalStatus" class="status-select" onchange="updateBookStatus()">
                            <option value="want-to-read">Want to Read</option>
                            <option value="reading">Reading</option>
                            <option value="completed">Completed</option>
                            <option value="dnf">Did Not Finish</option>
                        </select>

                        <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 10px;">
                            <label>Rating:</label>
                            <div class="rating-stars" id="modalRating">
                                <span class="star" data-rating="1" onclick="setRating(1)">★</span>
                                <span class="star" data-rating="2" onclick="setRating(2)">★</span>
                                <span class="star" data-rating="3" onclick="setRating(3)">★</span>
                                <span class="star" data-rating="4" onclick="setRating(4)">★</span>
                                <span class="star" data-rating="5" onclick="setRating(5)">★</span>
                            </div>
                        </div>

                        <p id="modalDescription" style="margin-top: 15px; line-height: 1.6;"></p>
                        
                        <div id="modalTopics" class="book-topics" style="margin-top: 15px;"></div>
                        
                        <a id="modalLink" href="#" target="_blank" style="display: inline-block; margin-top: 15px; color: var(--primary);">🔗 Purchase Link</a>
                    </div>
                </div>

                <!-- Notes Section -->
                <div class="notes-section">
                    <h3>📝 Reading Notes</h3>
                    <div class="note-input-area">
                        <input type="text" id="newNoteInput" class="note-input" placeholder="Add a new note..." onkeypress="if(event.key==='Enter') addNote()">
                        <button class="btn btn-primary" style="width: auto;" onclick="addNote()">Add Note</button>
                    </div>
                    <div id="notesList" class="notes-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let books = [];
        let currentBookId = null;
        let currentRating = 0;

        // Load books from JSON
        async function loadBooks() {
            try {
                const response = await fetch('books.json');
                const data = await response.json();
                books = data.collection;
                updateStats();
                renderBooks('all');
                document.getElementById('lastUpdated').textContent = new Date(data.meta.updated).toLocaleString('zh-HK');
            } catch (error) {
                console.error('Error loading books:', error);
                document.getElementById('booksGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <h3>No books found</h3>
                        <p>Click "Add Book" to start your collection!</p>
                    </div>
                `;
            }
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalBooks').textContent = books.length;
            document.getElementById('readingCount').textContent = books.filter(b => b.status === 'reading').length;
            document.getElementById('completedCount').textContent = books.filter(b => b.status === 'completed').length;
            document.getElementById('wantToReadCount').textContent = books.filter(b => b.status === 'want-to-read').length;
        }

        // Render books grid
        function renderBooks(filter = 'all') {
            const grid = document.getElementById('booksGrid');
            const filteredBooks = filter === 'all' ? books : books.filter(b => b.status === filter);

            if (filteredBooks.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <h3>No books in this category</h3>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredBooks.map(book => `
                <div class="book-card">
                    <img src="${book.coverImage || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23334155%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-size=%2220%22>📖</text></svg>'}" 
                         class="book-cover" alt="${book.title}" 
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23334155%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-size=%2220%22>📖</text></svg>'">
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-subtitle">${book.subtitle || ''}</div>
                        <div class="book-author">${book.author || 'Unknown Author'}</div>
                        <span class="book-status status-${book.status}">${formatStatus(book.status)}</span>
                        <div class="book-topics">
                            ${book.topics.slice(0, 5).map(t => `<span class="topic-tag">${t}</span>`).join('')}
                        </div>
                        <div class="book-actions">
                            <button class="btn btn-primary" onclick="openBookModal('${book.id}')">View Details</button>
                            <button class="btn btn-secondary" onclick="quickNote('${book.id}')">Quick Note</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Format status
        function formatStatus(status) {
            const statusMap = {
                'want-to-read': '📋 Want to Read',
                'reading': '📖 Reading',
                'completed': '✅ Completed',
                'dnf': '❌ Did Not Finish'
            };
            return statusMap[status] || status;
        }

        // Open book modal
        function openBookModal(bookId) {
            const book = books.find(b => b.id === bookId);
            if (!book) return;

            currentBookId = bookId;
            currentRating = book.rating || 0;

            document.getElementById('modalTitle').textContent = 'Book Details';
            document.getElementById('modalCover').src = book.coverImage || '';
            document.getElementById('modalCover').onerror = function() {
                this.src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23334155%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-size=%2220%22>📖</text></svg>';
            };
            document.getElementById('modalBookTitle').textContent = book.title;
            document.getElementById('modalBookSubtitle').textContent = book.subtitle || '';
            document.getElementById('modalBookAuthor').textContent = book.author || 'Unknown';
            document.getElementById('modalStatus').value = book.status;
            document.getElementById('modalDescription').textContent = book.description || '';
            document.getElementById('modalTopics').innerHTML = book.topics.map(t => `<span class="topic-tag">${t}</span>`).join('');
            document.getElementById('modalLink').href = book.purchaseLink || '#';
            document.getElementById('modalLink').style.display = book.purchaseLink ? 'inline-block' : 'none';

            // Update rating stars
            updateRatingStars();

            // Load notes
            renderNotes(book);

            document.getElementById('bookModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('bookModal').classList.remove('active');
            currentBookId = null;
        }

        // Update book status
        async function updateBookStatus() {
            if (!currentBookId) return;
            
            const book = books.find(b => b.id === currentBookId);
            if (book) {
                book.status = document.getElementById('modalStatus').value;
                book.updated = new Date().toISOString();
                await saveBooks();
                updateStats();
                renderBooks();
            }
        }

        // Set rating
        function setRating(rating) {
            currentRating = rating;
            updateRatingStars();
            
            const book = books.find(b => b.id === currentBookId);
            if (book) {
                book.rating = rating;
                saveBooks();
            }
        }

        // Update rating stars display
        function updateRatingStars() {
            const stars = document.querySelectorAll('#modalRating .star');
            stars.forEach((star, index) => {
                star.classList.toggle('active', index < currentRating);
            });
        }

        // Render notes
        function renderNotes(book) {
            const notesList = document.getElementById('notesList');
            
            if (!book.notes || book.notes.length === 0) {
                notesList.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No notes yet. Add your first note above!</p>';
                return;
            }

            notesList.innerHTML = book.notes.slice().reverse().map(note => `
                <div class="note-item">
                    <div class="note-date">📅 ${note.date}</div>
                    <div class="note-content">${note.content}</div>
                </div>
            `).join('');
        }

        // Add note
        async function addNote() {
            const input = document.getElementById('newNoteInput');
            const content = input.value.trim();
            
            if (!content || !currentBookId) return;

            const book = books.find(b => b.id === currentBookId);
            if (book) {
                if (!book.notes) book.notes = [];
                book.notes.push({
                    date: new Date().toISOString().split('T')[0],
                    content: content,
                    timestamp: new Date().toISOString()
                });
                book.updated = new Date().toISOString();
                
                input.value = '';
                await saveBooks();
                renderNotes(book);
            }
        }

        // Quick note from card
        function quickNote(bookId) {
            openBookModal(bookId);
            document.getElementById('newNoteInput').focus();
        }

        // Save books to JSON
        async function saveBooks() {
            try {
                const data = {
                    meta: {
                        created: books[0]?.addedAt || new Date().toISOString(),
                        updated: new Date().toISOString(),
                        version: '1.0'
                    },
                    collection: books,
                    settings: {
                        statuses: ['want-to-read', 'reading', 'completed', 'dnf'],
                        types: ['book', 'magazine', 'article', 'ebook', 'audiobook'],
                        ratings: [1, 2, 3, 4, 5],
                        defaultStatus: 'want-to-read'
                    }
                };

                // For browser-based app, we'll use localStorage as fallback
                localStorage.setItem('books', JSON.stringify(data));
                
                // Show save confirmation
                console.log('Books saved successfully');
            } catch (error) {
                console.error('Error saving books:', error);
            }
        }

        // Show add book form
        function showAddBookForm() {
            document.getElementById('addBookForm').style.display = 'block';
            document.getElementById('addBookForm').scrollIntoView({ behavior: 'smooth' });
        }

        // Hide add book form
        function hideAddBookForm() {
            document.getElementById('addBookForm').style.display = 'none';
        }

        // Add new book
        async function addNewBook() {
            const title = document.getElementById('newBookTitle').value.trim();
            if (!title) {
                alert('Please enter a book title');
                return;
            }

            const topics = document.getElementById('newBookTopics').value.trim()
                .split(',')
                .map(t => t.trim())
                .filter(t => t);

            const newBook = {
                id: `book-${String(books.length + 1).padStart(3, '0')}`,
                title: title,
                subtitle: document.getElementById('newBookSubtitle').value.trim(),
                author: document.getElementById('newBookAuthor').value.trim(),
                type: document.getElementById('newBookType').value,
                status: document.getElementById('newBookStatus').value,
                description: document.getElementById('newBookDescription').value.trim(),
                topics: topics.length > 0 ? topics : ['General'],
                coverImage: document.getElementById('newBookCover').value.trim() || null,
                rating: null,
                notes: [],
                highlights: [],
                addedAt: new Date().toISOString()
            };

            books.push(newBook);
            await saveBooks();
            updateStats();
            renderBooks();
            hideAddBookForm();

            // Clear form
            document.getElementById('newBookTitle').value = '';
            document.getElementById('newBookSubtitle').value = '';
            document.getElementById('newBookAuthor').value = '';
            document.getElementById('newBookDescription').value = '';
            document.getElementById('newBookTopics').value = '';
            document.getElementById('newBookCover').value = '';
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderBooks(btn.dataset.filter);
            });
        });

        // Close modal on outside click
        document.getElementById('bookModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('bookModal')) {
                closeModal();
            }
        });

        // Initialize
        loadBooks();
    </script>
</body>
</html>
